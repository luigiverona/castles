name: Pages

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7
      - name: Inspect static artifact
        shell: bash
        run: |
          set -euo pipefail
          test -f site/index.html
          test -f site/privacy.html
          test -f site/setup.html
          test -f site/support.html
          test -f site/style.css
          test -f site/logo.svg
          test -f site/favicon.svg
          test -f site/CNAME
          test -f site/install
          test -x site/install
          bash -n site/install
          test "$(cat site/CNAME)" = "castles.luigiverona.dev"
          test -z "$(find site -type l -print -quit)"
          test "$(find site -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)" = "$(printf '%s\n' CNAME favicon.svg index.html install logo.svg privacy.html setup.html style.css support.html)"
          ! grep -RInE '<script|<form|https?://[^" ]+\.(js|css|woff2?|ttf|otf)([?"#]|$)' site
          ! grep -RInE '(gh[pousr]_[A-Za-z0-9]{30,}|AIza[0-9A-Za-z_-]{30,}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY)' site
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy static artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
